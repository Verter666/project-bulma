<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Форма подписки Project Bulma.">
    <title>Project Bulma - Подписка</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar is-primary is-fixed-top" role="navigation" aria-label="main navigation">
            <div class="navbar-brand">
                <a class="navbar-item brand" href="index.html">Project Bulma</a>
                <button class="navbar-burger" type="button" aria-label="menu" aria-expanded="false" data-target="navbarMenu">
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                </button>
            </div>
            <div id="navbarMenu" class="navbar-menu">
                <div class="navbar-end">
                    <a class="navbar-item" href="index.html">Главная</a>
                    <a class="navbar-item" href="about.html">О проекте</a>
                    <a class="navbar-item" href="catalog.html">Каталог</a>
                    <a class="navbar-item" href="gallery.html">Галерея</a>
                    <a class="navbar-item" href="news.html">Новости</a>
                    <a class="navbar-item" href="faq.html">FAQ</a>
                    <a class="navbar-item is-active" href="subscription.html">Подписка</a>
                    <a class="navbar-item" href="contact.html">Контакты</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero page-hero">
            <div class="hero-body">
                <div class="container">
                    <p class="eyebrow">Форма</p>
                    <h1 class="title is-2">Подписка</h1>
                    <p class="subtitle is-5">Пример формы с полями, чекбоксом и демонстрационной отправкой.</p>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="columns is-centered">
                    <div class="column is-7">
                        <form class="box" data-demo-form>
                            <div class="field">
                                <label class="label" for="sub-name">Имя</label>
                                <div class="control">
                                    <input class="input" id="sub-name" type="text" placeholder="Ваше имя" required>
                                </div>
                            </div>
                            <div class="field">
                                <label class="label" for="sub-email">Email</label>
                                <div class="control">
                                    <input class="input" id="sub-email" type="email" placeholder="name@example.com" required>
                                </div>
                            </div>
                            <div class="field">
                                <label class="label" for="sub-topic">Интересующий раздел</label>
                                <div class="control">
                                    <div class="select is-fullwidth">
                                        <select id="sub-topic">
                                            <option>Новости проекта</option>
                                            <option>Каталог</option>
                                            <option>Галерея</option>
                                            <option>Все обновления</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="field">
                                <label class="checkbox">
                                    <input type="checkbox" required>
                                    Согласен получать учебную рассылку
                                </label>
                            </div>
                            <button class="button is-primary" type="submit">Отправить</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="content has-text-centered">
            <p><strong>Project Bulma</strong> - учебный адаптивный сайт, 2026.</p>
            <p><a href="contact.html">Контакты</a> | <a href="faq.html">FAQ</a> | <a href="about.html">О проекте</a> | <a href="index.html">Главная</a></p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
